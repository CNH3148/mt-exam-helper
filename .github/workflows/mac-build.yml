name: Build Mac Standalone Executable

on:
  workflow_dispatch: # 允許在 Actions 頁面手動點擊執行

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/server.py"

      - name: Install dependencies and Build Executable
        run: |
          cd "發行版/Mac未編譯/app"
          uvx --with fastapi --with uvicorn --with python-multipart --with pydantic pyinstaller --onefile server.py
          
      - name: Prepare Release Folder
        run: |
          mkdir -p Mac_Release
          
          # 複製我們預先準備好的 Mac免安裝 外殼與說明書
          cp -a "發行版/Mac免安裝/." Mac_Release/
          
          # 確保 app 資料夾存在
          mkdir -p Mac_Release/app
          
          # 將編譯出來的綠色執行檔 (server) 放進 app 裡
          cp "發行版/Mac未編譯/app/dist/server" Mac_Release/app/
          
          # 賦予執行權限，確保使用者下載後可以直接執行 (雖然 ZIP 有時會遺失權限，但做個保險)
          chmod +x Mac_Release/Start_App.command
          chmod +x Mac_Release/app/server
          
      - name: Zip Release
        run: |
          cd Mac_Release
          zip -r ../Mac免安裝版.zip ./*
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mac免安裝版
          path: Mac免安裝版.zip
